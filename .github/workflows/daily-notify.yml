name: Daily Push Notifications

on:
  schedule:
    # Tous les jours à 19h00 UTC = 20h Paris (heure d'hiver) / 21h (heure d'été)
    - cron: '0 19 * * *'
  workflow_dispatch: # permet de tester manuellement depuis l'onglet Actions

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin

      - name: Send daily notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/scripts/send-notifications.js
